server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy all /api/* requests to the Flask backend container.
    # "smoker-backend" resolves via Docker's internal DNS on the shared smoker-net network.
    # Port 5000 is the gunicorn port INSIDE the container (not the host port).
    location /api/ {
        proxy_pass         http://smoker-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # React Router: for any path that isn't a real file, serve index.html.
    # This handles /sessions/:id and /sessions/new on direct load/refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
