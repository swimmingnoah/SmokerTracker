<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d1d5db;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Smoke wisps -->
  <g fill="none" stroke="url(#smoke)" stroke-width="10" stroke-linecap="round">
    <path d="M170 180 Q160 150 170 120 Q180 90 170 60"/>
    <path d="M220 170 Q210 135 220 105 Q230 75 220 45"/>
    <path d="M270 175 Q260 145 270 115 Q280 85 270 55"/>
  </g>

  <!-- Smoker body -->
  <rect x="100" y="200" width="240" height="160" rx="24" fill="#1f2937"/>
  <rect x="100" y="200" width="240" height="160" rx="24" fill="none" stroke="#374151" stroke-width="4"/>

  <!-- Smoker lid highlight -->
  <rect x="112" y="208" width="216" height="8" rx="4" fill="#374151"/>

  <!-- Vent holes -->
  <circle cx="150" cy="280" r="8" fill="#4b5563"/>
  <circle cx="190" cy="280" r="8" fill="#4b5563"/>
  <circle cx="230" cy="280" r="8" fill="#4b5563"/>
  <circle cx="270" cy="280" r="8" fill="#4b5563"/>
  <circle cx="310" cy="280" r="8" fill="#4b5563"/>

  <!-- Fire glow underneath -->
  <ellipse cx="220" cy="365" rx="100" ry="12" fill="#f97316" opacity="0.5"/>
  <ellipse cx="220" cy="365" rx="60" ry="8" fill="#fbbf24" opacity="0.6"/>

  <!-- Legs -->
  <rect x="130" y="360" width="8" height="60" rx="4" fill="#1f2937"/>
  <rect x="302" y="360" width="8" height="60" rx="4" fill="#1f2937"/>

  <!-- Temperature probe -->
  <g transform="translate(340, 220)">
    <!-- Probe body -->
    <rect x="0" y="20" width="80" height="120" rx="12" fill="#1f2937" stroke="#374151" stroke-width="3"/>
    <!-- Screen -->
    <rect x="12" y="36" width="56" height="36" rx="6" fill="#065f46"/>
    <!-- Temperature reading -->
    <text x="40" y="60" text-anchor="middle" fill="#34d399" font-family="monospace" font-weight="bold" font-size="22">225</text>
    <!-- Degree symbol -->
    <text x="65" y="50" fill="#34d399" font-family="monospace" font-size="12">°F</text>
    <!-- Probe wire -->
    <path d="M20 140 Q10 160 20 180 Q30 200 20 220 L20 280" fill="none" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <!-- Probe tip -->
    <circle cx="20" cy="283" r="4" fill="#9ca3af"/>
    <!-- Buttons -->
    <circle cx="28" cy="95" r="6" fill="#374151"/>
    <circle cx="52" cy="95" r="6" fill="#374151"/>
    <!-- LED -->
    <circle cx="40" cy="115" r="4" fill="#22c55e"/>
  </g>

  <!-- Handle on smoker -->
  <rect x="185" y="192" width="70" height="10" rx="5" fill="#6b7280"/>

  <!-- Chart line accent at bottom -->
  <g transform="translate(80, 430)">
    <polyline points="0,30 30,25 60,10 90,18 120,5 150,15 180,8 210,20 240,12 270,22 300,15 350,10" fill="none" stroke="#fed7aa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
</svg>
