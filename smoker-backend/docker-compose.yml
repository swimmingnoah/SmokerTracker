version: '3.8'

services:
  smoker-backend:
    build: .
    container_name: smoker-backend
    ports:
      - "5001:5000"
    environment:
      - INFLUX_URL=${INFLUX_URL:-http://10.0.0.3:8086}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-homeassistant}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-smoker}
      - HA_URL=${HA_URL:-http://10.0.0.3:8123}
      - HA_TOKEN=${HA_TOKEN}
    restart: unless-stopped
    networks:
      - smoker-network

networks:
  smoker-network:
    driver: bridge
